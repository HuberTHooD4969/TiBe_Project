services:
  - type: web
    name: tibe-ultra
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: AD_WATCH_DURATION_SECONDS
        value: "30"
      - key: AD_WATCH_COOLDOWN_MINUTES
        value: "60"
      - key: MAX_FRAME_WORKERS
        value: "2"
      - key: CORS_ORIGINS
        value: "https://huberthood4969.github.io"
